name: CI/CD Pipeline (Yandex Cloud)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests
        working-directory: backend

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm install
        working-directory: frontend
      - name: Run tests
        run: npm run test
        working-directory: frontend

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and Push Backend
        run: |
          docker build --target backend -t cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/backend:latest .
          docker push cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/backend:latest

      - name: Build and Push Frontend
        run: |
          docker build --target frontend -t cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/frontend:latest .
          docker push cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/frontend:latest

      - name: Build and Push Gateway
        run: |
          docker build --target gateway -t cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/gateway:latest .
          docker push cr.yandex/${{ secrets.YCR_REGISTRY_ID }}/gateway:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Скачиваем код репозитория, чтобы забрать docker-compose.prod.yml

      - name: Copy docker-compose.prod.yml to Server
        uses: appleboy/scp-action@v0.1.7 # Копируем файл конфигурации на сервер Яндекса
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/app"

      - name: Deploy to Yandex Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/app || exit 1
            
            # Авторизуемся в YCR на сервере
            echo '${{ secrets.YC_SA_JSON_CREDENTIALS }}' | docker login --username json_key --password-stdin cr.yandex
            
            # Обновляем переменные окружения
            export YCR_REGISTRY_ID=${{ secrets.YCR_REGISTRY_ID }}
            
            # Скачиваем новые образы и перезапускаем контейнеры
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Очищаем старые неиспользуемые образы
            docker image prune -f

name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth_service, room_service, booking_service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
        working-directory: ${{ matrix.service }}
      - name: Run tests
        run: python -m pytest
        working-directory: ${{ matrix.service }}

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm install
        working-directory: frontend
      - name: Run tests
        run: npm run test
        working-directory: frontend

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build compose images
        run: docker compose build

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: cr.yandex/${YCR_REGISTRY_ID}/backend:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEFAULT_USERNAME: ${DEFAULT_USERNAME}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD}

  frontend:
    image: cr.yandex/${YCR_REGISTRY_ID}/frontend:latest
    restart: always
    depends_on:
      - backend

  gateway:
    image: cr.yandex/${YCR_REGISTRY_ID}/gateway:latest
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"

volumes:
  pg_data:
